# https://github.com/navikt/localauth
apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: "bidrag-localauth"
  namespace: "bidrag"
spec:
  image: "europe-north1-docker.pkg.dev/nais-management-233d/nais/localauth:v1.0.0"
  port: 8080
  replicas:
    min: 1
    max: 1
  liveness:
    path: "/internal/healthz"
  readiness:
    path: "/internal/healthz"
  resources:
    limits:
      memory: "256Mi"
    requests:
      cpu: "10m"
      memory: "32Mi"
  ingresses:
    - https://localauth-bidrag.intern.dev.nav.no
  azure:
    application:
      enabled: true
      allowAllUsers: true
      # uncomment below if you don't use the default tenant in dev
      # tenant: nav.no
  accessPolicy:
    outbound:
      rules:
        - application: "*"
          namespace: bidrag
  env:
    - name: LOCALAUTH_PUBLIC_URL
      value: "https://localauth-bidrag.intern.dev.nav.no"
