apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: {{name}}
  namespace: bidrag
  labels:
    team: bidrag
spec:
  image: {{image}}
  port: 3000
  ingresses:
  {{#each ingresses as |url|}}
    - {{url}}
  {{/each}}
  azure:
    sidecar:
      enabled: true
      autoLogin: true
    application:
      enabled: true
      allowAllUsers: true
      claims:
        extra:
          - NAVident
  accessPolicy:
    outbound:
      external:
      {{#each outbound.external as |host|}}
        - host: {{host}}
      {{/each}}

  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
        - id: team_logs
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 1Gi
  replicas:
    min: 1
    max: 1
  liveness:
    path: /internal/health/liveness
    initialDelay: 10
    periodSeconds: 10
  readiness:
    path: /internal/health/readiness
    initialDelay: 10
    periodSeconds: 10
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "3000"
  {{#each env}}
    - name: {{this.name }}
      value: "{{this.value}}"
  {{/each}}
