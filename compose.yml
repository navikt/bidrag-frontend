services:

    backend-proxy:
        # Proxy for backend som pekes på av wonderwall. Trengs for å unngå problemer med å skru backend av og på
        image: alpine/socat
        command:
            "tcp-l:80,fork,reuseaddr tcp:host.docker.internal:3000"
        extra_hosts:
            - "host.docker.internal:host-gateway"

#https://github.com/navikt/localauth
    redis:
        image: redis:7
        ports: [ "6379:6379" ]

    wonderwall:
        image: ghcr.io/nais/wonderwall:latest
        ports: ["4000:4000"]
        command: >
            --openid.well-known-url=https://localauth-bidrag.intern.dev.nav.no/entraid/.well-known/openid-configuration
            --openid.client-id=8313833b-e1eb-4015-8c2a-dee5b4bda61d
            --openid.provider=azure
            --openid.client-secret=unused
            --ingress=http://localhost:4000
            --bind-address=0.0.0.0:4000
            --upstream-host=backend-proxy:80
            --redis.uri=redis://redis:6379
            --cookie.secure=false
        restart: on-failure

    upstream:
        image: mendhak/http-https-echo:40
        environment:
            HTTP_PORT: 5000
            JWT_HEADER: Authorization

    texas:
