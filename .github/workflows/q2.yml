name: "Deploy til q2"
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    

jobs:
  build:
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit
    permissions:
      packages: write
      contents: read
      id-token: write

  deploy_q2:
    needs:
      - build
    name: "Deploy til q2"
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Deploy til dev-gcp q2
        uses: nais/deploy/actions/deploy@8a6fb62e73f837af6287d5db84a46ea96aa6c30d # v2
        env:
          ENVIRONMENT: q2
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml
          VARS: .nais/q2.yaml
          IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
