name: Build reusable workflow
on:
  workflow_call:
    secrets:
      READER_TOKEN:
        required: true
        description: 'Token with read access to the repository'

jobs:
  bygg:
    name: "Test, bygg og valider kode"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-auth-token: ${{ secrets.READER_TOKEN }}

      - name: Lint endrede filer
        run: pnpm run biome:ci:changed

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Bygg deploybar applikasjon for Docker
        run: pnpm run deploy:docker
        env:
          # Inkluderer miljøvariablene bygget forventer, selv om vi ikke laster opp til CDN her
          CDN_BASE_URL: https://cdn.nav.no/bidrag/bidrag-frontend/dist/